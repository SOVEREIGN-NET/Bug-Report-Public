name: Transfer Bug Report to Private Repo

on:
  issues:
    types: [opened]

jobs:
  transfer-issue:
    runs-on: ubuntu-latest
    # Only run if the issue has the "bug" label (set by the form)
    if: contains(github.event.issue.labels.*.name, 'bug')

    steps:
      - name: Create issue in private repo
        id: create_issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          script: |
            const issue = context.payload.issue;

            const body = [
              `> **Transferred from public repo:** ${context.payload.repository.full_name}#${issue.number}`,
              `> **Submitted by:** @${issue.user.login}`,
              `> **Original URL:** ${issue.html_url}`,
              ``,
              issue.body
            ].join('\n');

            const result = await github.rest.issues.create({
              owner: process.env.PRIVATE_OWNER,
              repo:  process.env.PRIVATE_REPO,
              title: issue.title,
              body:  body,
              labels: ['bug', 'triage', 'from-public'],
            });

            core.setOutput('private_issue_url', result.data.html_url);
            core.setOutput('private_issue_number', result.data.number);
        env:
          # Trial run: falls back to THIS repo if private repo secrets are not yet set
          PRIVATE_OWNER: ${{ secrets.PRIVATE_REPO_OWNER || github.repository_owner }}
          PRIVATE_REPO:  ${{ secrets.PRIVATE_REPO_NAME || github.event.repository.name }}

      - name: Comment on public issue and close it
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.payload.issue.number;
            const privateUrl  = '${{ steps.create_issue.outputs.private_issue_url }}';

            // Thank the reporter and confirm receipt
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: issueNumber,
              body: [
                '### Thank you for your bug report!',
                '',
                'Your report has been received and transferred to our internal tracker for triage.',
                '',
                'A member of the team will review it shortly. You will be notified here if we need more information.',
                '',
                '_This issue has been closed here to keep this public repo clean. Your report is **not** lost._'
              ].join('\n')
            });

            // Label as transferred
            await github.rest.issues.addLabels({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: issueNumber,
              labels:       ['transferred']
            });

            // Close the public issue
            await github.rest.issues.update({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: issueNumber,
              state:        'closed',
              state_reason: 'not_planned'
            });

            // Lock to prevent further comments
            await github.rest.issues.lock({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: issueNumber,
              lock_reason:  'resolved'
            });
