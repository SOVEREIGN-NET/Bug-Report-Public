name: Transfer Bug Report to Sovereign Network

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  transfer-issue:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'bug'

    steps:
      - name: Verify NEW_SECRET is configured
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::NEW_SECRET is not set. Go to Settings → Secrets and variables → Actions and create a secret named NEW_SECRET with a PAT that has repo + project scope on The-Sovereign-Network."
            exit 1
          fi
        env:
          TOKEN: ${{ secrets.NEW_SECRET }}

      - name: Create issue in The-Sovereign-Network repo
        id: create_issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.NEW_SECRET }}
          script: |
            const issue = context.payload.issue;

            const body = [
              `> **Transferred from public intake:** ${context.payload.repository.full_name}#${issue.number}`,
              `> **Submitted by:** @${issue.user.login}`,
              `> **Original URL:** ${issue.html_url}`,
              ``,
              issue.body
            ].join('\n');

            const result = await github.rest.issues.create({
              owner:  'SOVEREIGN-NET',
              repo:   'Sovereign-Network-Mobile',
              title:  issue.title,
              body:   body,
              labels: ['bug', 'triage', 'from-public'],
            });

            core.setOutput('issue_node_id', result.data.node_id);
            core.setOutput('issue_url',     result.data.html_url);

      - name: Add issue to Project board #5
        uses: actions/github-script@v7
        env:
          ISSUE_NODE_ID: ${{ steps.create_issue.outputs.issue_node_id }}
        with:
          github-token: ${{ secrets.NEW_SECRET }}
          script: |
            const projectQuery = await github.graphql(`
              query {
                organization(login: "SOVEREIGN-NET") {
                  projectV2(number: 5) {
                    id
                  }
                }
              }
            `);
            const projectId = projectQuery.organization.projectV2.id;

            await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item { id }
                }
              }
            `, {
              projectId,
              contentId: process.env.ISSUE_NODE_ID
            });

            core.info('Issue added to Project #5');

      - name: Comment on public issue and close it
        uses: actions/github-script@v7
        env:
          TRACKER_URL: ${{ steps.create_issue.outputs.issue_url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.payload.issue.number;
            const trackerUrl  = process.env.TRACKER_URL;

            // Ensure the 'transferred' label exists in this repo before applying it
            try {
              await github.rest.issues.createLabel({
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                name:        'transferred',
                color:       '0052cc',
                description: 'Bug report transferred to internal tracker'
              });
            } catch (e) {
              if (e.status !== 422) throw e; // 422 = label already exists, which is fine
            }

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: issueNumber,
              body: [
                '### Thank you for your bug report!',
                '',
                'Your report has been received and added to our tracker for triage.',
                '',
                'A member of the team will review it shortly. You will be notified here if we need more information.',
                '',
                '_This issue has been closed here to keep this public repo clean. Your report is **not** lost._'
              ].join('\n')
            });

            await github.rest.issues.addLabels({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: issueNumber,
              labels:       ['transferred']
            });

            await github.rest.issues.update({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: issueNumber,
              state:        'closed',
              state_reason: 'not_planned'
            });

            await github.rest.issues.lock({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: issueNumber,
              lock_reason:  'off-topic'
            });